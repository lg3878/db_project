{% extends 'layout.html' %}

{% block content %}

<h1>Add Membership</h1>

    <form method="POST" action="/add_membership">
        <label for="membership_name">Membership Name:</label>
        <input type="text" id="membership_name" required>
        <br><br>

        <label for="price">Price ($):</label>
        <input type="number" name="price" id="price" step="0.01" min="0" required>
        <br><br>

        <label for="duration_months">Duration (months):</label>
        <input type="number" name="duration_months" id="duration_months" min="1" required>
        <br><br>

        <button type="submit">Add Membership</button>
    </form>

    <br>
    <a href="/memberships">Back to Memberships</a>

{% endblock %}
