{% extends 'layout.html' %}
{% block content %}

<h1>Add Staff Member</h1>

<form method="POST" action="/add_staff">
    <label for="name">Name:</label>
    <input type="text" name="name" id="name" required>
    <br><br>

    <label for="phone_number">Phone:</label>
    <input type="text" name="phone_number" id="phone_number">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" name="email" id="email" required>
    <br><br>

    <label for="hire_date">Hire Date:</label>
    <input type="date" name="hire_date" id="hire_date" required>
    <br><br>

    <label for="salary">Salary ($):</label>
    <input type="number" name="salary" id="salary" step="0.01" min="0" required>
    <br><br>

    <label for="role">Role:</label>
    <input type="text" name="role" id="role" required>
    <br><br>

    <label for="is_trainer">Is this staff member a trainer?</label>
    <input type="checkbox" name="is_trainer" id="is_trainer" onchange="toggleCertification(this)">
    <br><br>

    <div id="certification_field" style="display:none;">
        <label for="certification">Certification:</label>
        <input type="text" name="certification" id="certification">
        <br><br>
    </div>

    <button type="submit">Add Staff Member</button>
</form>

<br>
<a href="/staff">Back to Staff</a>

<script>
    function toggleCertification(checkbox) {
        const field = document.getElementById('certification_field');
        field.style.display = checkbox.checked ? 'block' : 'none';
    }
</script>

{% endblock %}
