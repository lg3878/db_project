{% extends 'layout.html' %}
{% block content %}
<h1>Edit Equipment</h1>
<form method="POST">
    <label>Equipment Name:
        <input type="text" name="equipment_name" value="{{ item.equipment_name }}" required>
    </label><br>
    <label>Purchase Date:
        <input type="date" name="purchase_date" value="{{ item.purchase_date }}" required>
    </label><br>
    <button type="submit">Save Changes</button>
    <a href="/equipment">Cancel</a>
</form>
{% endblock %}
